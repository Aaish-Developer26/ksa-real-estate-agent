services:
  - type: web
    name: ksa-re-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: >-
      uvicorn src.api.main:app
      --host 0.0.0.0
      --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: GROQ_API_KEY
        sync: false
      - key: LITELLM_MODEL
        value: groq/llama-3.1-70b-versatile
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: riyadh-re-agent
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: POSTGRES_URL
        fromDatabase:
          name: ksa-re-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ksa-re-redis
          type: redis
          property: connectionString
    healthCheckPath: /health
    autoDeploy: true

  - type: worker
    name: ksa-re-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: >-
      celery -A src.workers.celery_app.celery_app worker
      --loglevel=info
      --concurrency=2
    envVars:
      - key: APP_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: LITELLM_MODEL
        value: groq/llama-3.1-70b-versatile
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: POSTGRES_URL
        fromDatabase:
          name: ksa-re-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ksa-re-redis
          type: redis
          property: connectionString

  - type: redis
    name: ksa-re-redis
    plan: free
    ipAllowList: []

databases:
  - name: ksa-re-db
    plan: free
    databaseName: riyadh_re
    user: agent_user
